# Neksur Postgres 16 + AGE 1.6.0 HA-mode configuration.
#
# Wave 2 (Plan 00-03) — extends infra/postgres/postgresql.base.conf with
# HA-specific settings. Mounted into each Patroni-managed Postgres container
# at /etc/postgresql/16/main/postgresql.ha.conf and referenced by patroni.yml's
# `postgresql.custom_conf` directive.
#
# Source of truth: 00-RESEARCH.md §Patroni Configuration sketch + §Pitfall 9.
# Decision: docs/decisions/D-W2-ha-tool.md.
#
# DO NOT diverge from the base.conf invariants (shared_preload_libraries,
# archive_mode/archive_timeout, wal_level, hot_standby, max_wal_senders) —
# this file extends, never overrides, those settings. The Patroni
# bootstrap.dcs.postgresql.parameters block also re-asserts the critical
# ones for redundancy: a divergent postgresql.conf without the matching
# Patroni-DCS line would be reverted on the next `patronictl reload`.

# -----------------------------------------------------------------------------
# Synchronous replication — graph integrity gate (D-W2-ha-tool).
#
# `synchronous_commit = remote_write` means: a transaction is acknowledged
# as committed once at least one synchronous standby has WRITTEN (not yet
# fsync'd) the WAL record. This is the "remote write" tier — faster than
# `remote_apply` (which waits for replay) but safer than `local` (which
# only requires the primary's commit). The matching `synchronous_mode: true`
# in patroni.yml ensures Patroni manages the synchronous-standby list
# (auto-promotes a replica to synchronous if the current sync standby fails).
#
# `synchronous_standby_names = 'ANY 1 (pg_node_2, pg_node_3)'` says: any
# 1 of these 2 named standbys must ack a write before commit returns. The
# `ANY` quorum syntax (Postgres 10+) matches Patroni's synchronous_node_count=1.
# When the primary is pg-node-1, this list applies; on failover Patroni
# re-renders the list automatically per the cluster's current topology.
# -----------------------------------------------------------------------------
synchronous_commit = remote_write
synchronous_standby_names = 'ANY 1 (pg_node_2, pg_node_3)'

# -----------------------------------------------------------------------------
# WAL retention — bounds how far behind a standby can be without catching up
# from the archive (Plan 00-04 / pgBackRest). 1 GB at typical Phase 0 write
# rates (~100 KB/s sustained, ~10 MB/s burst) keeps standbys current for
# ~10 minutes of unbroken replication interruption — well above Patroni's
# loop_wait + retry_timeout window.
# -----------------------------------------------------------------------------
wal_keep_size = 1024MB

# -----------------------------------------------------------------------------
# Replication slot caps — Patroni uses physical replication slots (per the
# `use_slots: true` line in patroni.yml). 5 slots cover the 3-node cluster
# (1 per follower) with headroom for transient slot churn during failover
# (Patroni occasionally creates a temporary slot during replica catch-up).
# -----------------------------------------------------------------------------
max_replication_slots = 5

# -----------------------------------------------------------------------------
# Hot-standby feedback — replicas inform the primary of their oldest active
# transaction so the primary's vacuum doesn't remove rows still visible to
# read queries on the replica. Cost: replica-side long queries can bloat
# the primary's heap. For the Phase 0 read-mostly Cypher workload the
# bloat risk is small; the win (no query cancellation on replicas) is
# operationally important for long Cypher path-traversal queries.
# -----------------------------------------------------------------------------
hot_standby_feedback = on

# -----------------------------------------------------------------------------
# Connection / memory tuning — modest defaults sized for the Phase 0 envelope
# (Plan 00-06 will load-test against these). Patroni's bootstrap also exposes
# these as DCS-level parameters; keep this file's values consistent.
# -----------------------------------------------------------------------------
max_connections = 200
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 16MB
maintenance_work_mem = 256MB

# Checkpoint tuning — chunk WAL writes so checkpoint I/O doesn't spike the
# primary's tail latency (D-001.14: P99 < 2s on Cypher reads).
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB

# Logging — structured enough for Wave 4 observability scrape.
log_min_duration_statement = 250ms      # log queries > 250ms (Cypher P99 budget)
log_lock_waits = on
log_temp_files = 0                      # log every temp file (catches missed indexes)
log_checkpoints = on
log_connections = on
log_disconnections = on
log_line_prefix = '%m [%p] %q%u@%d '
