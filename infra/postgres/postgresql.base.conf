# Neksur Postgres 16 + AGE 1.6.0 base configuration.
#
# Wave 0 scaffold (Plan 00-01). Mounted into the apache/age container by the
# deployer (Plan 00-04 will produce the canonical compose / Helm chart).
#
# Wave 1+ may extend this file (additional indexes, connection-pool sizing,
# autovacuum tuning). This file holds the contract-level minima locked by
# ADR-001 and 00-RESEARCH.md.

# -----------------------------------------------------------------------------
# Extensions loaded at server start.
#   - age: REQUIRED by every Cypher operation (ADR-001 D-001.01).
#   - pgaudit: admin DDL audit (Phase 0 stepping stone to Phase 6 hash-chain
#     audit log).
#   - pg_stat_statements: query-level metrics consumed by the observability
#     middleware (Plan 00-05).
# -----------------------------------------------------------------------------
shared_preload_libraries = 'age,pgaudit,pg_stat_statements'

# -----------------------------------------------------------------------------
# WAL archival — pgBackRest at 15-min RPO (D-OQ.04).
#
# archive_command is intentionally OMITTED from Wave 0. Plan 00-04 (Wave 3 —
# pgBackRest) writes the canonical value once the pgBackRest stanza name is
# fixed, e.g.:
#
#   archive_command = 'pgbackrest --stanza=neksur archive-push %p'
#
# Setting archive_mode=on with no archive_command would cause Postgres to
# accumulate WAL on disk until it crashes — DO NOT add a placeholder. Plan
# 00-04 fills this in atomically with the stanza creation.
#
# archive_timeout = 60s forces a WAL segment switch every minute so the
# replay floor lags the primary by at most ~60s plus archive-push latency
# (00-RESEARCH.md §3 — RPO tightening cost analysis).
# -----------------------------------------------------------------------------
archive_mode = on
archive_timeout = 60

# -----------------------------------------------------------------------------
# Replication / standby (Patroni HA — Plan 00-03 / Wave 2).
# -----------------------------------------------------------------------------
wal_level = replica
max_wal_senders = 10
hot_standby = on

# -----------------------------------------------------------------------------
# pgaudit: log every DDL and role change. Phase 6 will tighten this further
# (per-tenant audit, hash-chain). Keep Wave 0 minimal.
# -----------------------------------------------------------------------------
pgaudit.log = 'ddl,role'
