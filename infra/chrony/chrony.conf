# chrony daemon configuration for Postgres hosts — Plan 00-05 Wave 4 / C-TECH-10.
#
# Per 00-RESEARCH.md §Standard Stack and §Pitfall 8, every Postgres host
# in the Phase 0 cluster runs chronyd to keep wall-clock drift bounded.
# The two-tier alert (ClockSkewWarn >100ms / ClockSkewPage >500ms,
# defined in ops/prometheus/alerts/clock-skew.yaml from Plan 01) consumes
# `chrony_tracking_last_offset_seconds` which is exposed by the
# superq/chrony-exporter sidecar that talks to chronyd over the local
# control socket configured below.
#
# Why two-tier (Pitfall 8): Iceberg's `snapshot_id` is the canonical
# ordering key per C-TECH-10, so clock skew is an EARLY WARNING for
# the audit log timestamp ordering, not a data-correctness fault. The
# 100ms WARN tier is aggressive on purpose — it gives ops time to
# investigate NTP health BEFORE the 500ms PAGE threshold is reached.
#
# Deployment notes:
#   - Install: apt-get install chrony  (or yum install chrony).
#   - Place file: /etc/chrony/chrony.conf
#   - Enable: systemctl enable --now chrony
#   - Verify: chronyc tracking ; chronyc sources -v
#
# The chrony-exporter sidecar (superq/chrony-exporter:v0.12.0) talks to
# chronyd over the cmdsocket — see infra/chrony/chrony-exporter.yml for
# the connection contract.

# Use a public NTP pool with iburst for fast initial sync. Production
# deployments should override this with the customer's preferred NTP
# source (commonly an internal NTP appliance, AWS time.aws.com, or
# the cloud provider's metadata-service NTP).
pool 2.pool.ntp.org iburst maxsources 4

# In test mode, allow a one-shot step adjustment up to 1.0s in the
# first 3 measurements. After that, drift is corrected via slew (slow
# adjustment) only — preventing a sudden time jump that would confuse
# Postgres's WAL timestamp ordering.
makestep 1.0 3

# Enable kernel synchronization of the real-time clock (RTC) so that
# wall-clock survives reboot.
rtcsync

# chrony control socket — required for chronyc and the
# chrony-exporter sidecar to query tracking state.
#
# `cmdallow 127.0.0.1` permits the loopback interface (where the
# exporter sidecar lives in single-host deployments).
cmdallow 127.0.0.1

# `bindcmdaddress 0.0.0.0` binds the cmdsocket on all interfaces so
# the exporter (running in a separate container with its own
# network namespace) can reach it. Combined with `cmdallow` this is
# safe — only loopback / explicitly-allowed peers can issue commands.
#
# IMPORTANT (threat T-0-CLK / boundary documentation): in production
# `bindcmdaddress` MUST be a private-network address, NEVER a public
# interface. The chrony cmdsocket allows runtime tracking-source
# manipulation; exposing it to the internet is a clock-tampering
# attack surface.
bindcmdaddress 0.0.0.0

# Log file for diagnostic / post-incident review.
logdir /var/log/chrony

# Driftfile carries the persisted clock-drift coefficient across
# reboots so chronyd doesn't need to re-learn it on every cold start.
driftfile /var/lib/chrony/drift
