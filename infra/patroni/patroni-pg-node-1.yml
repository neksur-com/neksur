# RENDERED Patroni config for pg-node-1 in docker-compose.ha.yml chaos-test mode.
#
# Source: infra/patroni/patroni.yml.template (Plan 00-03 Task 1).
# Differences from the production template:
#   - etcd: plaintext http (no cert-auth) — single-host bridge network
#   - watchdog: off — Linux softdog inside Docker is unreliable; production uses systemd hardware watchdog
#   - hostnames are docker-compose container names (pg-node-1/2/3, etcd-1/2/3)
#
# Keep the four Patroni invariants exact (ttl=30, synchronous_mode=true,
# shared_preload_libraries='age,...', archive_timeout='60'). The rest of the
# config matches the production template.

scope: neksur-pg
namespace: /db/
name: pg-node-1

restapi:
  listen: 0.0.0.0:8008
  connect_address: pg-node-1:8008

etcd3:
  hosts: etcd-1:2379,etcd-2:2379,etcd-3:2379
  protocol: http

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    synchronous_mode: true
    synchronous_node_count: 1
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        shared_preload_libraries: 'age,pgaudit,pg_stat_statements'
        archive_mode: 'on'
        archive_command: '/bin/true'   # Plan 00-04 will wire pgbackrest; chaos test does not need archives
        archive_timeout: '60'
        max_wal_senders: '10'
        max_replication_slots: '5'
        wal_level: 'replica'
        hot_standby: 'on'
        hot_standby_feedback: 'on'
        synchronous_commit: 'remote_write'
        wal_keep_size: '1024MB'
        pgaudit.log: 'ddl,role'
  initdb:
    - encoding: UTF8
    - data-checksums
  pg_hba:
    - host replication replicator 172.30.0.0/24 scram-sha-256
    - host all all 172.30.0.0/24 scram-sha-256
    - host all all 0.0.0.0/0 scram-sha-256
  users:
    admin:
      password: admin
      options:
        - createrole
        - createdb
    replicator:
      password: replicator_chaos_test
      options:
        - replication

postgresql:
  listen: 0.0.0.0:5432
  connect_address: pg-node-1:5432
  data_dir: /var/lib/postgresql/16/main
  bin_dir: /usr/lib/postgresql/16/bin
  pgpass: /tmp/pgpass0
  authentication:
    replication:
      username: replicator
      password: replicator_chaos_test
    superuser:
      username: postgres
      password: postgres
  parameters:
    unix_socket_directories: '/var/run/postgresql'
    shared_preload_libraries: 'age,pgaudit,pg_stat_statements'

# Watchdog: off in chaos-test mode (production uses systemd hardware watchdog).
watchdog:
  mode: off

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false
