name: Load / Chaos / Restore (heavy)

on:
  schedule:
    # 03:00 UTC nightly — heavy suite, not blocking PRs.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "Ad-hoc Phase 0 envelope check"

permissions:
  contents: read

concurrency:
  group: heavy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  load:
    name: Load envelope (Plan 00-06 / Wave 5)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
      - name: Install project (dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run load suite
        run: pytest tests/load -x -m load

  chaos:
    name: Chaos drills (Plan 00-03 / Wave 2 — Patroni kill-primary)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
      - name: Install project (dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run chaos suite
        run: pytest tests/chaos -x -m chaos

  restore:
    name: Restore drills (Plan 00-04 / Wave 3 — pgBackRest PITR + monthly)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
      - name: Install project (dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: PITR restore drill
        run: bash tests/dr/restore_pit.sh --assert-rto-under 3600
      - name: Chaos restore (RPO assertion)
        run: bash tests/dr/chaos_restore.sh --assert-rpo-under 900
      - name: Monthly restore runbook
        run: bash tests/dr/run_monthly_restore_drill.sh
