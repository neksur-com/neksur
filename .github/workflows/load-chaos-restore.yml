name: Load / Chaos / Restore (heavy)

on:
  schedule:
    # 03:00 UTC nightly — heavy suite, not blocking PRs.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "Ad-hoc Phase 0 envelope check"

permissions:
  contents: read

concurrency:
  group: heavy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  load:
    name: Load envelope (Plan 00-06 / Wave 5)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run load suite
        # `go test -tags=load` selects the load-tagged tests once Plan 06
        # implements them. Until then the stub package returns an
        # ErrNotImplemented sentinel that the runner should accept.
        run: go test ./tests/load/... -tags=load -timeout=120m -count=1

  chaos:
    name: Chaos drills (Plan 00-03 / Wave 2 — Patroni kill-primary)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run chaos suite
        # `go test -tags=chaos` selects the chaos-tagged tests once Plan
        # 03 implements them. Until then the stub package returns an
        # ErrNotImplemented sentinel.
        run: go test ./tests/chaos/... -tags=chaos -timeout=30m -count=1

  restore:
    name: Restore drills (Plan 00-04 / Wave 3 — pgBackRest PITR + monthly)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: PITR restore drill
        # Bash skeletons — Plan 04 will fill in the real logic. The
        # `--assert-rto-under N` arg is the contract the scripts
        # already understand; until implemented they exit with a
        # known non-zero status that the runner will surface.
        run: bash tests/dr/restore_pit.sh --assert-rto-under 3600
      - name: Chaos restore (RPO assertion)
        run: bash tests/dr/chaos_restore.sh --assert-rpo-under 900
      - name: Monthly restore runbook
        run: bash tests/dr/run_monthly_restore_drill.sh
