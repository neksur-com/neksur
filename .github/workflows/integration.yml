name: Integration tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: pytest tests/integration (Postgres 16 + AGE 1.6.0 via testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Verify Docker is available
        # ubuntu-latest runners ship Docker pre-installed; this step makes the
        # dependency explicit so a future runner image change surfaces here.
        run: docker version

      - name: Install project (dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pre-pull AGE image (cache for the run)
        # testcontainers will pull on first use, but doing it explicitly gives
        # us a clearer log line on test-fixture cold-start.
        run: docker pull apache/age:release_PG16_1.6.0

      - name: Run integration tests
        env:
          # testcontainers + Docker socket — defaults on ubuntu-latest.
          TESTCONTAINERS_RYUK_DISABLED: "false"
        run: pytest tests/integration -x -m integration
