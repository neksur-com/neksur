name: Integration tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: go test ./tests/integration ./tests/security (Postgres 16 + AGE 1.6.0 via testcontainers-go)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Docker is available
        # ubuntu-latest runners ship Docker pre-installed; this step makes the
        # dependency explicit so a future runner image change surfaces here.
        run: docker version

      - name: Pre-pull AGE image (cache for the run)
        # testcontainers-go will pull on first use, but doing it explicitly
        # gives us a clearer log line on test-fixture cold-start and avoids
        # the per-test-package implicit pull race.
        run: docker pull apache/age:release_PG16_1.6.0

      - name: Install Atlas CLI
        # Phase 0.5 — D-0.5.17 — Atlas is the migration runner. The
        # tenant-loop integration test (TestAtlasLoopApplyRollbackApply)
        # shells out to the atlas binary; it must be on PATH before
        # `go test ./tests/integration/...` runs. The atlasgo.sh install
        # script writes to /usr/local/bin by default; pin the version
        # via the ATLAS_VERSION env var if we need reproducible builds
        # later (RESEARCH §Standard Stack line 174 + VALIDATION.md L89).
        run: |
          curl -sSf https://atlasgo.sh | sh
          atlas version

      - name: Run integration + security tests
        # Phase 0.5: the integration tier now spans both the Phase 0
        # tests (RLS smoke) and the new -tags integration suite
        # (TestAtlasLoopApplyRollbackApply + ProvisionTenant). The build
        # tag is set so saas_fixtures.go compiles into the test binary.
        env:
          # testcontainers-go uses Docker socket; defaults work on
          # ubuntu-latest. The reaper container ("ryuk") is enabled by
          # default — keeps stale containers cleaned up.
          TESTCONTAINERS_RYUK_DISABLED: "false"
        run: go test -tags integration ./tests/integration/... ./tests/security/... -race -count=1 -timeout=20m
